loom.platform=fabric

# Minecraft 26.1 is unobfuscated and requires Java 25. Keep this variant on
# Mojang's official names; Yarn is no longer supported for this target.
deps.yarn_build=none
deps.yacl=none

# Fabric
deps.fapi=0.154.0+26.1.2
deps.fabric_loader=0.19.3
deps.trinkets=4.0.0-beta.3+26.1
deps.modmenu=none
deps.forgeconfigapi=none

# Mod
mod.mc_dep=26.1.2
mod.mc_title=26.1.2
mod.mc_targets=26.1.2

# Optional integrations do not yet have compatible artifacts wired into this
# port. They will be re-enabled individually as their APIs are migrated.
runtime.sodium=false
env.snapshot=true
